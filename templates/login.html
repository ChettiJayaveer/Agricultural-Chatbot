<!DOCTYPE html>
<html>
<head>
    <title>Login - Agrigenius</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-container">
    <div class="auth-box">
        <img src="{{ url_for('static', filename='images/logo.png') }}" width="120">
        <h2>Welcome Back</h2>
        <form action="/login" method="POST">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-agri" style="margin-top: 20px;">Sign In</button>
        </form>
        <p style="margin-top: 15px; font-size: 0.9rem;">New here? <a href="/signup" style="color: #FFB703; font-weight: bold;">Start for free</a></p>
    </div>
</body>
</html>
