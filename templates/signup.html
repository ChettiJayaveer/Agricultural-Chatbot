<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Agrigenius</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="auth-container">
        <div class="auth-box">
            <div style="text-align: center;">
                <img src="{{ url_for('static', filename='images/logo.png') }}" width="60" alt="Logo">
                <h2>Create Account</h2>
            </div>
            
            <form action="/signup" method="POST" enctype="multipart/form-data">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="text" name="city" placeholder="City" required>
                <input type="text" name="mobile" placeholder="Mobile Number" required>
                <input type="email" name="email" placeholder="Email ID" required>
                
                <div style="margin: 10px 0;">
                    <label style="font-size: 0.8rem; color: var(--earth-brown);">Upload Profile Picture:</label>
                    <input type="file" name="profile_pic" accept="image/*">
                </div>

                <input type="password" name="password" placeholder="Password (Min 8 chars, 1 Cap, 1 Symbol, 1 No)" required>
                <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                
                <button type="submit" class="btn-agri">Register Now</button>
            </form>
            
            <p style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
                Already have an account? <a href="{{ url_for('login') }}" style="color: var(--accent-green);">Sign In</a>
            </p>
        </div>
    </div>

</body>
</html>
